version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shelter_postgres
    environment:
      POSTGRES_USER: shelter_user
      POSTGRES_PASSWORD: shelter_password
      POSTGRES_DB: shelter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelter_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
